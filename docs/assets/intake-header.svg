<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC" />
      <stop offset="50%" stop-color="#F1F5F9" />
      <stop offset="100%" stop-color="#E2E8F0" />
    </linearGradient>

    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#CBD5E1" stroke-width="0.5" stroke-dasharray="2 2" opacity="0.5"/>
    </pattern>

    <filter id="shadow-sm" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0F172A" flood-opacity="0.04" />
    </filter>

    <filter id="shadow-md" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.08" />
    </filter>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="30" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg-grad)" />
  <rect width="1200" height="400" fill="url(#grid)" />

  <!-- Ambient background glow behind the illustration -->
  <circle cx="750" cy="150" r="250" fill="#DBEAFE" filter="url(#glow)" opacity="0.6"/>

  <!-- Connector Lines -->
  <!-- We put these before the nodes/cards so they render underneath -->
  <path d="M 600 86 C 650 86, 650 154, 710 154" fill="none" stroke="#94A3B8" stroke-width="2" stroke-dasharray="4 4" />
  <path d="M 600 154 L 710 154" fill="none" stroke="#94A3B8" stroke-width="2" stroke-dasharray="4 4" />
  <path d="M 600 222 C 650 222, 650 154, 710 154" fill="none" stroke="#94A3B8" stroke-width="2" stroke-dasharray="4 4" />

  <path d="M 710 154 C 760 154, 760 112, 820 112" fill="none" stroke="#38BDF8" stroke-width="3" />
  <path d="M 710 154 C 760 154, 760 210, 820 210" fill="none" stroke="#38BDF8" stroke-width="3" />

  <!-- Left Zone: Branding and Text -->
  <g transform="translate(60, 70)">
    <!-- Logo Mark -->
    <rect x="0" y="0" width="52" height="52" rx="14" fill="#0F172A" filter="url(#shadow-md)" />
    <rect x="0" y="0" width="52" height="52" rx="14" fill="none" stroke="#334155" stroke-width="1" />
    <rect x="14" y="16" width="10" height="10" rx="3" fill="#38BDF8" />
    <rect x="28" y="16" width="10" height="10" rx="3" fill="#0EA5E9" />
    <rect x="14" y="28" width="24" height="10" rx="3" fill="#2563EB" />

    <!-- Wordmark -->
    <text x="70" y="38" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="38" font-weight="800" fill="#0F172A" letter-spacing="-1">Intake</text>

    <!-- Subtitle -->
    <text x="0" y="95" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="700" fill="#1E293B" letter-spacing="-0.5">AI lead intake and</text>
    <text x="0" y="125" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="700" fill="#1E293B" letter-spacing="-0.5">CRM review system</text>

    <!-- Value Line -->
    <text x="0" y="165" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="500" fill="#475569">Turn messy lead submissions into</text>
    <text x="0" y="190" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="500" fill="#475569">structured CRM-ready records.</text>
  </g>

  <!-- Center Zone: Messy Inputs -->
  <g transform="translate(460, 60)" filter="url(#shadow-sm)">
    <rect x="0" y="0" width="140" height="52" rx="8" fill="#FFFFFF" stroke="#E2E8F0"/>
    <circle cx="16" cy="26" r="6" fill="#F1F5F9" />
    <rect x="32" y="18" width="80" height="5" rx="2.5" fill="#94A3B8"/>
    <rect x="32" y="30" width="50" height="5" rx="2.5" fill="#CBD5E1"/>
  </g>
  <g transform="translate(460, 128)" filter="url(#shadow-sm)">
    <rect x="0" y="0" width="140" height="52" rx="8" fill="#FFFFFF" stroke="#E2E8F0"/>
    <circle cx="16" cy="26" r="6" fill="#F1F5F9" />
    <rect x="32" y="18" width="60" height="5" rx="2.5" fill="#94A3B8"/>
    <rect x="32" y="30" width="90" height="5" rx="2.5" fill="#CBD5E1"/>
  </g>
  <g transform="translate(460, 196)" filter="url(#shadow-sm)">
    <rect x="0" y="0" width="140" height="52" rx="8" fill="#FFFFFF" stroke="#E2E8F0"/>
    <circle cx="16" cy="26" r="6" fill="#F1F5F9" />
    <rect x="32" y="18" width="70" height="5" rx="2.5" fill="#94A3B8"/>
    <rect x="32" y="30" width="40" height="5" rx="2.5" fill="#CBD5E1"/>
  </g>

  <!-- Center Node -->
  <g transform="translate(710, 154)">
    <circle cx="0" cy="0" r="36" fill="#DBEAFE" opacity="0.6"/>
    <circle cx="0" cy="0" r="24" fill="#FFFFFF" stroke="#0EA5E9" stroke-width="4" filter="url(#shadow-md)"/>
    <path d="M 0 -12 L 3 -4 L 11 -1 L 3 2 L 0 10 L -3 2 L -11 -1 L -3 -4 Z" fill="#2563EB"/>
    <path d="M -8 -8 L -7 -5 L -4 -4 L -7 -3 L -8 0 L -9 -3 L -12 -4 L -9 -5 Z" fill="#38BDF8"/>
    <path d="M 8 6 L 9 8 L 11 9 L 9 10 L 8 12 L 7 10 L 5 9 L 7 8 Z" fill="#38BDF8"/>
  </g>

  <!-- Right Zone: Structured Outputs -->
  <g transform="translate(820, 70)" filter="url(#shadow-md)">
    <rect x="0" y="0" width="300" height="84" rx="8" fill="#FFFFFF" stroke="#E2E8F0" />

    <rect x="20" y="20" width="24" height="24" rx="6" fill="#DBEAFE" />
    <path d="M 26 32 L 30 36 L 38 26" fill="none" stroke="#2563EB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="56" y="24" width="60" height="6" rx="3" fill="#1E293B"/>
    <rect x="56" y="36" width="40" height="4" rx="2" fill="#64748B"/>

    <rect x="155" y="22" width="55" height="20" rx="10" fill="#F0FDF4" stroke="#BBF7D0"/>
    <text x="182.5" y="36" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" font-weight="700" fill="#166534" text-anchor="middle">98% Conf.</text>

    <rect x="220" y="22" width="60" height="20" rx="10" fill="#F8FAFC" stroke="#E2E8F0"/>
    <circle cx="230" cy="32" r="3" fill="#10B981" />
    <text x="254" y="36" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" font-weight="700" fill="#475569" text-anchor="middle">Low Risk</text>

    <rect x="20" y="60" width="70" height="4" rx="2" fill="#E2E8F0"/>
    <rect x="100" y="60" width="90" height="4" rx="2" fill="#E2E8F0"/>
    <rect x="200" y="60" width="60" height="4" rx="2" fill="#E2E8F0"/>
  </g>

  <g transform="translate(820, 168)" filter="url(#shadow-md)">
    <rect x="0" y="0" width="300" height="84" rx="8" fill="#FFFFFF" stroke="#E2E8F0" />

    <rect x="20" y="20" width="24" height="24" rx="6" fill="#F0F9FF" />
    <path d="M 27 27 Q 32 35 37 27" fill="none" stroke="#0284C7" stroke-width="2" stroke-linecap="round"/>
    <circle cx="32" cy="24" r="2" fill="#0284C7"/>

    <rect x="56" y="24" width="75" height="6" rx="3" fill="#1E293B"/>
    <rect x="56" y="36" width="50" height="4" rx="2" fill="#64748B"/>

    <rect x="150" y="22" width="60" height="20" rx="10" fill="#FEF2F2" stroke="#FECACA"/>
    <text x="180" y="36" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" font-weight="700" fill="#991B1B" text-anchor="middle">Review</text>

    <rect x="220" y="22" width="60" height="20" rx="10" fill="#EFF6FF" stroke="#BFDBFE"/>
    <text x="250" y="36" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" font-weight="700" fill="#1D4ED8" text-anchor="middle">CRM Sync</text>

    <rect x="20" y="60" width="50" height="4" rx="2" fill="#E2E8F0"/>
    <rect x="80" y="60" width="100" height="4" rx="2" fill="#E2E8F0"/>
    <rect x="190" y="60" width="80" height="4" rx="2" fill="#E2E8F0"/>
  </g>

  <!-- Bottom Zone: Feature Chips -->
  <g transform="translate(70, 320)">
    <rect width="160" height="36" rx="18" fill="#FFFFFF" stroke="#CBD5E1" filter="url(#shadow-sm)"/>
    <circle cx="20" cy="18" r="4" fill="#2563EB" />
    <text x="34" y="23" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="600" fill="#1E293B">Mock AI extraction</text>
  </g>

  <g transform="translate(305, 320)">
    <rect width="130" height="36" rx="18" fill="#FFFFFF" stroke="#CBD5E1" filter="url(#shadow-sm)"/>
    <circle cx="20" cy="18" r="4" fill="#0EA5E9" />
    <text x="34" y="23" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="600" fill="#1E293B">Human review</text>
  </g>

  <g transform="translate(510, 320)">
    <rect width="180" height="36" rx="18" fill="#FFFFFF" stroke="#CBD5E1" filter="url(#shadow-sm)"/>
    <circle cx="20" cy="18" r="4" fill="#F59E0B" />
    <text x="34" y="23" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="600" fill="#1E293B">Duplicate risk signal</text>
  </g>

  <g transform="translate(765, 320)">
    <rect width="170" height="36" rx="18" fill="#FFFFFF" stroke="#CBD5E1" filter="url(#shadow-sm)"/>
    <circle cx="20" cy="18" r="4" fill="#10B981" />
    <text x="34" y="23" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="600" fill="#1E293B">Simulated CRM sync</text>
  </g>

  <g transform="translate(1010, 320)">
    <rect width="110" height="36" rx="18" fill="#FFFFFF" stroke="#CBD5E1" filter="url(#shadow-sm)"/>
    <circle cx="20" cy="18" r="4" fill="#64748B" />
    <text x="34" y="23" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="600" fill="#1E293B">Audit trail</text>
  </g>
</svg>
