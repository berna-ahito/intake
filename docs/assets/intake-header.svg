<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 380" width="100%" height="100%">
  <title>Intake Banner</title>
  <desc>A clean product banner layout showing the Intake AI CRM system features and mock extraction preview.</desc>
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC" />
      <stop offset="100%" stop-color="#F1F5F9" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.05" />
    </filter>
    <filter id="shadow-lg" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Banner Background -->
  <rect width="1200" height="380" rx="24" fill="url(#bg-grad)" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Left Side: Brand -->
  <g transform="translate(80, 70)">
    <!-- Logo Mark -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="48" height="48" rx="12" fill="#E0F2FE" />
      <path d="M16 26 L22 32 L34 18" stroke="#0284C7" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <!-- Sparkle/AI star -->
      <path d="M 36 6 Q 36 12 42 12 Q 36 12 36 18 Q 36 12 30 12 Q 36 12 36 6" fill="#06B6D4"/>
    </g>

    <!-- Wordmark -->
    <text x="64" y="34" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="800" fill="#0F172A" letter-spacing="-0.5">Intake</text>

    <!-- Subtitle -->
    <text x="0" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="600" fill="#1E293B" letter-spacing="-0.5">
      AI lead <tspan fill="#0284C7">intake</tspan> and CRM review system
    </text>

    <!-- Value Line -->
    <text x="0" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="400" fill="#475569">
      Turn messy lead submissions into
    </text>
    <text x="0" y="166" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="400" fill="#475569">
      structured CRM-ready records.
    </text>
  </g>

  <!-- Bottom Chips Row -->
  <g transform="translate(160, 300)">
    <!-- Chip 1 -->
    <g transform="translate(0, 0)">
      <rect width="164" height="36" rx="18" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow)"/>
      <circle cx="16" cy="18" r="4" fill="#0EA5E9"/>
      <text x="90" y="23" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#475569" text-anchor="middle">Mock AI extraction</text>
    </g>

    <!-- Chip 2 -->
    <g transform="translate(180, 0)">
      <rect width="130" height="36" rx="18" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow)"/>
      <circle cx="16" cy="18" r="4" fill="#3B82F6"/>
      <text x="73" y="23" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#475569" text-anchor="middle">Human review</text>
    </g>

    <!-- Chip 3 -->
    <g transform="translate(326, 0)">
      <rect width="190" height="36" rx="18" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow)"/>
      <circle cx="16" cy="18" r="4" fill="#06B6D4"/>
      <text x="103" y="23" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#475569" text-anchor="middle">Duplicate risk signal</text>
    </g>

    <!-- Chip 4 -->
    <g transform="translate(532, 0)">
      <rect width="174" height="36" rx="18" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow)"/>
      <circle cx="16" cy="18" r="4" fill="#3B82F6"/>
      <text x="95" y="23" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#475569" text-anchor="middle">Simulated CRM sync</text>
    </g>

    <!-- Chip 5 -->
    <g transform="translate(722, 0)">
      <rect width="110" height="36" rx="18" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow)"/>
      <circle cx="16" cy="18" r="4" fill="#64748B"/>
      <text x="63" y="23" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#475569" text-anchor="middle">Audit trail</text>
    </g>
  </g>

  <!-- Right Side: Main Card -->
  <g transform="translate(680, 40)">
    <!-- Background Offset Layer -->
    <rect x="16" y="16" width="340" height="200" rx="16" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1" opacity="0.8"/>

    <!-- Foreground Layer -->
    <g filter="url(#shadow-lg)">
      <rect x="0" y="0" width="340" height="200" rx="16" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>

      <!-- Card Header -->
      <path d="M0 16 C0 7.163 7.163 0 16 0 L324 0 C332.837 0 340 7.163 340 16 L340 40 L0 40 Z" fill="#F8FAFC" />
      <line x1="0" y1="40" x2="340" y2="40" stroke="#F1F5F9" stroke-width="1" />
      <circle cx="20" cy="20" r="4" fill="#CBD5E1" />
      <circle cx="34" cy="20" r="4" fill="#CBD5E1" />
      <circle cx="48" cy="20" r="4" fill="#CBD5E1" />
      <text x="320" y="24" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#64748B" text-anchor="end">Lead Inbox</text>

      <!-- Row 1 -->
      <g transform="translate(16, 56)">
        <rect width="308" height="36" rx="6" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
        <rect x="12" y="12" width="60" height="12" rx="4" fill="#CBD5E1" />
        <rect x="80" y="12" width="100" height="12" rx="4" fill="#E2E8F0" />
        <circle cx="290" cy="18" r="4" fill="#3B82F6"/>
      </g>

      <!-- Row 2 -->
      <g transform="translate(16, 100)" filter="url(#shadow)">
        <rect width="308" height="36" rx="6" fill="#FFFFFF" stroke="#94A3B8" stroke-width="1" />
        <rect x="12" y="12" width="80" height="12" rx="4" fill="#64748B" />
        <rect x="100" y="12" width="120" height="12" rx="4" fill="#94A3B8" />
        <circle cx="290" cy="18" r="4" fill="#64748B"/>
      </g>

      <!-- Row 3 -->
      <g transform="translate(16, 144)">
        <rect width="308" height="36" rx="6" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
        <rect x="12" y="12" width="50" height="12" rx="4" fill="#CBD5E1" />
        <rect x="70" y="12" width="110" height="12" rx="4" fill="#E2E8F0" />
        <circle cx="290" cy="18" r="4" fill="#06B6D4"/>
      </g>
    </g>
  </g>

  <!-- Right Connectors and Chips -->
  <!-- Synced -->
  <path d="M 1004 114 L 1040 114" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="3 3" fill="none"/>
  <g transform="translate(1040, 100)">
     <rect width="80" height="28" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow)"/>
     <text x="40" y="18" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#3B82F6" text-anchor="middle">Synced</text>
  </g>

  <!-- Review -->
  <path d="M 1004 158 L 1040 158" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="3 3" fill="none"/>
  <g transform="translate(1040, 144)">
     <rect width="80" height="28" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow)"/>
     <text x="40" y="18" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#475569" text-anchor="middle">Review</text>
  </g>

  <!-- Extracted -->
  <path d="M 1004 202 L 1040 202" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="3 3" fill="none"/>
  <g transform="translate(1040, 188)">
     <rect width="80" height="28" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow)"/>
     <text x="40" y="18" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#06B6D4" text-anchor="middle">Extracted</text>
  </g>

  <!-- Low risk -->
  <path d="M 1004 202 L 1018 202 Q 1024 202 1024 208 L 1024 234 Q 1024 240 1030 240 L 1040 240" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="3 3" fill="none"/>
  <g transform="translate(1040, 226)">
     <rect width="80" height="28" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow)"/>
     <text x="40" y="18" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#0EA5E9" text-anchor="middle">Low risk</text>
  </g>

</svg>
