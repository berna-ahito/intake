<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 380" width="100%" height="100%">
  <title>Intake - AI lead intake and CRM review system</title>
  <desc>Visualization of messy lead submissions transforming into structured CRM-ready records through mock extraction, human review, duplicate risk signaling, simulated CRM sync, and audit logging.</desc>
  <defs>
    <!-- Background Gradients -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="50%" stop-color="#060e20"/>
      <stop offset="100%" stop-color="#02040a"/>
    </linearGradient>

    <radialGradient id="glow-center" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>

    <!-- Faint grid pattern -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#1e293b" stroke-width="0.5" stroke-opacity="0.4"/>
      <circle cx="0" cy="0" r="1" fill="#38bdf8" fill-opacity="0.2"/>
    </pattern>

    <!-- Shadows and Filters -->
    <filter id="drop-shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.6"/>
    </filter>

    <filter id="glass-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000000" flood-opacity="0.4"/>
    </filter>

    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <filter id="glow-large" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="60" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <filter id="glow-medium" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="30" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <linearGradient id="glass-card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.9"/>
    </linearGradient>

    <linearGradient id="glass-chip" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0.9"/>
    </linearGradient>

    <linearGradient id="connector-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="50%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>

  <!-- Background Layer -->
  <rect width="1200" height="380" fill="url(#bg-grad)"/>
  <rect width="1200" height="380" fill="url(#grid)"/>
  <rect width="1200" height="380" fill="url(#glow-center)"/>

  <!-- Glowing background accents behind central node -->
  <circle cx="630" cy="145" r="100" fill="#0284c7" filter="url(#glow-large)" opacity="0.3"/>
  <circle cx="200" cy="150" r="120" fill="#0ea5e9" filter="url(#glow-large)" opacity="0.15"/>
  <circle cx="950" cy="150" r="100" fill="#2563eb" filter="url(#glow-medium)" opacity="0.15"/>

  <!-- Connectors from Inputs to Central Node -->
  <!-- Upper input (y=85) to Center (y=145) -->
  <path d="M 590 85 C 610 85, 610 145, 630 145" fill="none" stroke="#475569" stroke-width="2" stroke-dasharray="4 4" />
  <!-- Middle input (y=145) to Center (y=145) -->
  <path d="M 590 145 L 630 145" fill="none" stroke="#475569" stroke-width="2" stroke-dasharray="4 4" />
  <!-- Lower input (y=205) to Center (y=145) -->
  <path d="M 590 205 C 610 205, 610 145, 630 145" fill="none" stroke="#475569" stroke-width="2" stroke-dasharray="4 4" />

  <!-- Connectors from Central Node to Output Cards -->
  <!-- Center (y=145) to Output 1 (y=85) -->
  <path d="M 630 145 C 670 145, 680 85, 740 85" fill="none" stroke="url(#connector-grad)" stroke-width="2" opacity="0.8" />
  <!-- Center (y=145) to Output 2 (y=145) -->
  <path d="M 630 145 C 670 145, 680 145, 740 145" fill="none" stroke="url(#connector-grad)" stroke-width="2" opacity="0.8" />
  <!-- Center (y=145) to Output 3 (y=205) -->
  <path d="M 630 145 C 670 145, 680 205, 740 205" fill="none" stroke="url(#connector-grad)" stroke-width="2" opacity="0.8" />

  <!-- Left Zone: Branding and Text (x: 70 to 430) -->
  <g transform="translate(70, 70)">
    <!-- Premium Logo Mark -->
    <g filter="url(#drop-shadow)">
      <rect x="0" y="0" width="56" height="56" rx="14" fill="#0f172a" stroke="#38bdf8" stroke-width="1.5"/>
      <rect x="14" y="16" width="10" height="10" rx="3" fill="#7dd3fc" filter="url(#glow-cyan)"/>
      <rect x="28" y="16" width="14" height="10" rx="3" fill="#38bdf8" />
      <rect x="14" y="30" width="28" height="10" rx="3" fill="#0ea5e9" />
    </g>

    <!-- Wordmark -->
    <text x="76" y="40" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="44" font-weight="800" fill="#ffffff" letter-spacing="-1">Intake</text>

    <!-- Subtitle -->
    <text x="0" y="105" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="24" font-weight="700" fill="#38bdf8" letter-spacing="-0.5">AI lead intake and</text>
    <text x="0" y="135" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="24" font-weight="700" fill="#e2e8f0" letter-spacing="-0.5">CRM review system</text>

    <!-- Value Line -->
    <text x="0" y="180" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="500" fill="#94a3b8">Turn messy lead submissions into</text>
    <text x="0" y="205" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="500" fill="#94a3b8">structured CRM-ready records.</text>
  </g>

  <!-- Middle Zone: Transformation Inputs (x: 470 to 700) -->
  <!-- Input 1 -->
  <g transform="translate(470, 65)" filter="url(#glass-shadow)">
    <rect x="0" y="0" width="120" height="40" rx="8" fill="url(#glass-card)" stroke="#334155" stroke-width="1"/>
    <circle cx="16" cy="20" r="5" fill="#475569" />
    <rect x="28" y="14" width="70" height="4" rx="2" fill="#64748b"/>
    <rect x="28" y="22" width="40" height="4" rx="2" fill="#475569"/>
  </g>
  <!-- Input 2 -->
  <g transform="translate(470, 125)" filter="url(#glass-shadow)">
    <rect x="0" y="0" width="120" height="40" rx="8" fill="url(#glass-card)" stroke="#334155" stroke-width="1"/>
    <circle cx="16" cy="20" r="5" fill="#475569" />
    <rect x="28" y="14" width="50" height="4" rx="2" fill="#64748b"/>
    <rect x="28" y="22" width="75" height="4" rx="2" fill="#475569"/>
  </g>
  <!-- Input 3 -->
  <g transform="translate(470, 185)" filter="url(#glass-shadow)">
    <rect x="0" y="0" width="120" height="40" rx="8" fill="url(#glass-card)" stroke="#334155" stroke-width="1"/>
    <circle cx="16" cy="20" r="5" fill="#475569" />
    <rect x="28" y="14" width="60" height="4" rx="2" fill="#64748b"/>
    <rect x="28" y="22" width="30" height="4" rx="2" fill="#475569"/>
  </g>

  <!-- Central Processing Node -->
  <g transform="translate(630, 145)" filter="url(#drop-shadow)">
    <circle cx="0" cy="0" r="28" fill="#0f172a" stroke="#0ea5e9" stroke-width="2"/>
    <circle cx="0" cy="0" r="22" fill="#1e293b" />
    <!-- AI extraction icon -->
    <path d="M 0 -10 L 2 -3 L 9 -3 L 4 2 L 6 9 L 0 5 L -6 9 L -4 2 L -9 -3 L -2 -3 Z" fill="#38bdf8" filter="url(#glow-cyan)"/>
  </g>

  <!-- Right Zone: Structured Output Cards (x: 740 to 1120) -->
  <!-- Card 1 -->
  <g transform="translate(740, 60)" filter="url(#drop-shadow)">
    <rect x="0" y="0" width="360" height="50" rx="8" fill="url(#glass-card)" stroke="#1e293b" stroke-width="1"/>
    <!-- Icon -->
    <rect x="16" y="13" width="24" height="24" rx="6" fill="#022c22" stroke="#065f46" stroke-width="1"/>
    <path d="M 22 25 L 26 29 L 34 19" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Lines -->
    <rect x="52" y="19" width="80" height="4" rx="2" fill="#cbd5e1"/>
    <rect x="52" y="29" width="60" height="4" rx="2" fill="#64748b"/>

    <!-- Pills -->
    <rect x="180" y="15" width="65" height="20" rx="10" fill="#064e3b" stroke="#047857" stroke-width="1"/>
    <text x="212.5" y="28.5" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" font-weight="600" fill="#34d399" text-anchor="middle">Extracted</text>

    <rect x="255" y="15" width="65" height="20" rx="10" fill="#022c22" stroke="#065f46" stroke-width="1"/>
    <circle cx="267" cy="25" r="3" fill="#10b981" filter="url(#glow-cyan)"/>
    <text x="294" y="28.5" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" font-weight="600" fill="#34d399" text-anchor="middle">Low risk</text>
  </g>

  <!-- Card 2 -->
  <g transform="translate(740, 120)" filter="url(#drop-shadow)">
    <rect x="0" y="0" width="360" height="50" rx="8" fill="url(#glass-card)" stroke="#1e293b" stroke-width="1"/>
    <!-- Icon -->
    <rect x="16" y="13" width="24" height="24" rx="6" fill="#451a03" stroke="#78350f" stroke-width="1"/>
    <circle cx="28" cy="25" r="2" fill="#fbbf24" />
    <circle cx="22" cy="25" r="2" fill="#fbbf24" />
    <circle cx="34" cy="25" r="2" fill="#fbbf24" />

    <!-- Lines -->
    <rect x="52" y="19" width="100" height="4" rx="2" fill="#cbd5e1"/>
    <rect x="52" y="29" width="40" height="4" rx="2" fill="#64748b"/>

    <!-- Pills -->
    <rect x="180" y="15" width="65" height="20" rx="10" fill="#451a03" stroke="#78350f" stroke-width="1"/>
    <text x="212.5" y="28.5" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" font-weight="600" fill="#fbbf24" text-anchor="middle">Review</text>
  </g>

  <!-- Card 3 -->
  <g transform="translate(740, 180)" filter="url(#drop-shadow)">
    <rect x="0" y="0" width="360" height="50" rx="8" fill="url(#glass-card)" stroke="#1e293b" stroke-width="1"/>
    <!-- Icon -->
    <rect x="16" y="13" width="24" height="24" rx="6" fill="#022c22" stroke="#065f46" stroke-width="1"/>
    <path d="M 22 25 L 26 29 L 34 19" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Lines -->
    <rect x="52" y="19" width="90" height="4" rx="2" fill="#cbd5e1"/>
    <rect x="52" y="29" width="50" height="4" rx="2" fill="#64748b"/>

    <!-- Pills -->
    <rect x="180" y="15" width="65" height="20" rx="10" fill="#064e3b" stroke="#047857" stroke-width="1"/>
    <text x="212.5" y="28.5" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" font-weight="600" fill="#34d399" text-anchor="middle">Synced</text>

    <rect x="255" y="15" width="65" height="20" rx="10" fill="#022c22" stroke="#065f46" stroke-width="1"/>
    <circle cx="267" cy="25" r="3" fill="#10b981" filter="url(#glow-cyan)"/>
    <text x="294" y="28.5" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" font-weight="600" fill="#34d399" text-anchor="middle">Low risk</text>
  </g>

  <!-- Bottom Zone: Feature Chips Row (y: 310) -->
  <g transform="translate(70, 310)">
    <!-- Chip 1: Mock AI extraction -->
    <g transform="translate(0, 0)" filter="url(#glass-shadow)">
      <rect width="160" height="32" rx="16" fill="url(#glass-chip)" stroke="#1e293b" stroke-width="1.5"/>
      <circle cx="16" cy="16" r="4" fill="#0ea5e9" filter="url(#glow-cyan)"/>
      <text x="28" y="20.5" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="500" fill="#e2e8f0">Mock AI extraction</text>
    </g>

    <!-- Chip 2: Human review -->
    <g transform="translate(185, 0)" filter="url(#glass-shadow)">
      <rect width="125" height="32" rx="16" fill="url(#glass-chip)" stroke="#1e293b" stroke-width="1.5"/>
      <circle cx="16" cy="16" r="4" fill="#38bdf8" filter="url(#glow-cyan)"/>
      <text x="28" y="20.5" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="500" fill="#e2e8f0">Human review</text>
    </g>

    <!-- Chip 3: Duplicate risk signal -->
    <g transform="translate(335, 0)" filter="url(#glass-shadow)">
      <rect width="170" height="32" rx="16" fill="url(#glass-chip)" stroke="#1e293b" stroke-width="1.5"/>
      <circle cx="16" cy="16" r="4" fill="#f59e0b" filter="url(#glow-cyan)"/>
      <text x="28" y="20.5" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="500" fill="#e2e8f0">Duplicate risk signal</text>
    </g>

    <!-- Chip 4: Simulated CRM sync -->
    <g transform="translate(530, 0)" filter="url(#glass-shadow)">
      <rect width="165" height="32" rx="16" fill="url(#glass-chip)" stroke="#1e293b" stroke-width="1.5"/>
      <circle cx="16" cy="16" r="4" fill="#10b981" filter="url(#glow-cyan)"/>
      <text x="28" y="20.5" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="500" fill="#e2e8f0">Simulated CRM sync</text>
    </g>

    <!-- Chip 5: Audit trail -->
    <g transform="translate(720, 0)" filter="url(#glass-shadow)">
      <rect width="105" height="32" rx="16" fill="url(#glass-chip)" stroke="#1e293b" stroke-width="1.5"/>
      <circle cx="16" cy="16" r="4" fill="#94a3b8" filter="url(#glow-cyan)"/>
      <text x="28" y="20.5" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="500" fill="#e2e8f0">Audit trail</text>
    </g>
  </g>
</svg>
