<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 160" role="img" aria-labelledby="title desc">
  <title id="title">Intake</title>
  <desc id="desc">Data flow from messy leads to structured CRM records</desc>
  <style>
    .text-main { fill: #0f172a; }
    .stroke-main { stroke: #64748b; }
    @media (prefers-color-scheme: dark) {
      .text-main { fill: #f8fafc; }
      .stroke-main { stroke: #94a3b8; }
    }
  </style>
  <g transform="translate(240, 40)">
    <!-- Messy side -->
    <path class="stroke-main" d="M10 20h24M5 40h36M15 60h20" stroke-width="6" stroke-linecap="round"/>
    <circle cx="10" cy="20" r="5" fill="#06b6d4"/>
    <circle cx="5" cy="40" r="5" fill="#1d4ed8"/>
    <circle cx="15" cy="60" r="5" fill="#06b6d4"/>

    <!-- Arrow -->
    <path class="stroke-main" d="M65 40h34" stroke-width="4" stroke-linecap="round"/>
    <path d="m89 30 10 10-10 10" fill="none" stroke="#06b6d4" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Structured side -->
    <rect x="120" y="15" width="24" height="10" rx="3" fill="#1d4ed8"/>
    <rect x="120" y="35" width="24" height="10" rx="3" fill="#06b6d4"/>
    <rect x="120" y="55" width="24" height="10" rx="3" fill="#1d4ed8"/>
    <path class="stroke-main" d="M154 20h20M154 40h20M154 60h20" stroke-width="4" stroke-linecap="round"/>

    <!-- Wordmark -->
    <text x="200" y="58" class="text-main" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="46" font-weight="800">Intake</text>
  </g>
</svg>
