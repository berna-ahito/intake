<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 380" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="main-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EEF6FF" />
      <stop offset="50%" stop-color="#E2F3FF" />
      <stop offset="100%" stop-color="#D0E8FF" />
    </linearGradient>

    <!-- Navy Panel Gradient -->
    <linearGradient id="navy-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#1E293B" />
    </linearGradient>

    <!-- Filters for Shadows -->
    <filter id="shadow-sm" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0F172A" flood-opacity="0.04" />
    </filter>
    <filter id="shadow-md" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0F172A" flood-opacity="0.06" />
    </filter>
    <filter id="shadow-lg" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-color="#0F172A" flood-opacity="0.1" />
    </filter>
    <filter id="glow-cyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Line Gradients -->
    <linearGradient id="line-grad-1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#94A3B8" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.8" />
    </linearGradient>
    <linearGradient id="line-grad-2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0EA5E9" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#94A3B8" stop-opacity="0.4" />
    </linearGradient>
  </defs>

  <!-- Base Background -->
  <rect width="1200" height="380" fill="url(#main-bg)" stroke="#BAE6FD" stroke-width="1"/>

  <!-- Accent Panel for Brand Block -->
  <rect x="40" y="30" width="390" height="250" rx="24" fill="url(#navy-grad)" stroke="#1E293B" stroke-width="2" filter="url(#shadow-lg)" />

  <!-- Left: Brand Block (Zone: 70 to 430) -->
  <g transform="translate(80, 80)">
    <!-- Logo -->
    <rect width="56" height="56" rx="14" fill="#0EA5E9" filter="url(#shadow-md)" />
    <path d="M 14 24 L 28 34 L 42 24 L 42 36 C 42 40 38 44 34 44 L 22 44 C 18 44 14 40 14 36 Z" fill="#FFFFFF" />
    <path d="M 14 24 L 28 34 L 42 24 L 28 14 Z" fill="#E0F2FE" />
    <path d="M 28 8 L 30 14 L 36 16 L 30 18 L 28 24 L 26 18 L 20 16 L 26 14 Z" fill="#7DD3FC" />

    <text x="76" y="40" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="40" font-weight="800" fill="#FFFFFF" letter-spacing="-1.5">Intake</text>

    <!-- Subtitle -->
    <text x="0" y="100" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="24" font-weight="700" fill="#F8FAFC" letter-spacing="-0.5">
      <tspan x="0" dy="0">AI lead intake and</tspan>
      <tspan x="0" dy="32">CRM review system</tspan>
    </text>

    <!-- Value Line -->
    <text x="0" y="165" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="500" fill="#94A3B8" letter-spacing="-0.2">
      <tspan x="0" dy="0">Turn messy lead submissions into</tspan>
      <tspan x="0" dy="24">structured CRM-ready records.</tspan>
    </text>
  </g>

  <!-- Middle: Transformation Zone (Zone: 470 to 700) -->
  <g transform="translate(470, 50)">
    <!-- messy lead snippets -->
    <g filter="url(#shadow-sm)">
      <rect x="0" y="20" width="85" height="40" rx="8" fill="#FFFFFF" stroke="#E2E8F0" />
      <path d="M 12 35 L 60 35 M 12 45 L 40 45" stroke="#94A3B8" stroke-width="3" stroke-linecap="round" />
    </g>

    <g filter="url(#shadow-sm)">
      <rect x="15" y="80" width="85" height="40" rx="8" fill="#FFFFFF" stroke="#E2E8F0" />
      <path d="M 27 95 L 75 95 M 27 105 L 55 105" stroke="#94A3B8" stroke-width="3" stroke-linecap="round" stroke-dasharray="6 4" />
    </g>

    <g filter="url(#shadow-sm)">
      <rect x="-5" y="140" width="85" height="40" rx="8" fill="#FFFFFF" stroke="#E2E8F0" />
      <path d="M 7 155 L 60 155 M 7 165 L 35 165" stroke="#94A3B8" stroke-width="3" stroke-linecap="round" />
    </g>

    <!-- Connector lines -->
    <g fill="none" stroke-width="3" stroke-linecap="round">
      <path d="M 85 40 C 105 40, 110 100, 135 100" stroke="url(#line-grad-1)" />
      <path d="M 100 100 L 135 100" stroke="url(#line-grad-1)" />
      <path d="M 80 160 C 105 160, 110 100, 135 100" stroke="url(#line-grad-1)" />

      <path d="M 135 100 C 180 100, 220 40, 270 40" stroke="url(#line-grad-2)" />
      <path d="M 135 100 C 180 100, 220 115, 270 115" stroke="url(#line-grad-2)" />
      <path d="M 135 100 C 180 100, 220 190, 270 190" stroke="url(#line-grad-2)" />
    </g>

    <!-- Node -->
    <g transform="translate(135, 100)">
      <circle cx="0" cy="0" r="32" fill="#0EA5E9" filter="url(#glow-cyan)" opacity="0.3" />
      <rect x="-24" y="-24" width="48" height="48" rx="12" fill="#0EA5E9" stroke="#BAE6FD" stroke-width="2" filter="url(#shadow-md)" />
      <path d="M -10 0 L -2 8 L 12 -6" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
    </g>
  </g>

  <!-- Right: CRM Output Records Zone (Zone: 740 to 1100) -->
  <g transform="translate(740, 60)">
    <!-- Record 1 -->
    <g transform="translate(0, 0)">
      <rect width="360" height="60" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow-md)" />
      <rect x="16" y="14" width="32" height="32" rx="8" fill="#F0F9FF" stroke="#BAE6FD" stroke-width="1" />
      <path d="M 24 30 L 29 35 L 39 25" fill="none" stroke="#0EA5E9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />

      <rect x="64" y="20" width="80" height="6" rx="3" fill="#1E293B" />
      <rect x="64" y="34" width="50" height="4" rx="2" fill="#94A3B8" />

      <!-- Status: Extracted -->
      <rect x="190" y="20" width="65" height="20" rx="10" fill="#F0F9FF" stroke="#BAE6FD" stroke-width="1" />
      <text x="222.5" y="33.5" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" font-weight="700" fill="#0284C7" text-anchor="middle">Extracted</text>

      <!-- Status: Low risk -->
      <rect x="265" y="20" width="75" height="20" rx="10" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1" />
      <circle cx="277" cy="30" r="4" fill="#0EA5E9" />
      <text x="306" y="33.5" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" font-weight="700" fill="#475569" text-anchor="middle">Low risk</text>
    </g>

    <!-- Record 2 -->
    <g transform="translate(0, 75)">
      <rect width="360" height="60" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow-lg)" />
      <rect x="16" y="14" width="32" height="32" rx="8" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1" />
      <path d="M 32 22 L 32 30 M 32 34 L 32 35" fill="none" stroke="#64748B" stroke-width="2.5" stroke-linecap="round" />

      <rect x="64" y="20" width="100" height="6" rx="3" fill="#1E293B" />
      <rect x="64" y="34" width="70" height="4" rx="2" fill="#94A3B8" />

      <!-- Status: Review -->
      <rect x="285" y="20" width="55" height="20" rx="10" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1" />
      <text x="312.5" y="33.5" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" font-weight="700" fill="#475569" text-anchor="middle">Review</text>
    </g>

    <!-- Record 3 -->
    <g transform="translate(0, 150)">
      <rect width="360" height="60" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow-md)" />
      <rect x="16" y="14" width="32" height="32" rx="8" fill="#F0F9FF" stroke="#BAE6FD" stroke-width="1" />
      <path d="M 26 30 L 30 34 L 38 26" fill="none" stroke="#0EA5E9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />

      <rect x="64" y="20" width="90" height="6" rx="3" fill="#1E293B" />
      <rect x="64" y="34" width="60" height="4" rx="2" fill="#94A3B8" />

      <!-- Status: Synced -->
      <rect x="285" y="20" width="55" height="20" rx="10" fill="#F0F9FF" stroke="#BAE6FD" stroke-width="1" />
      <text x="312.5" y="33.5" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" font-weight="700" fill="#0284C7" text-anchor="middle">Synced</text>
    </g>
  </g>

  <!-- Bottom: Feature Chips Row (Zone: y 300 to 340) -->
  <g transform="translate(180, 310)">
    <rect width="170" height="32" rx="16" fill="#F0F9FF" stroke="#BAE6FD" stroke-width="1" />
    <circle cx="16" cy="16" r="4" fill="#0EA5E9" />
    <text x="28" y="21" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="600" fill="#0F172A">Mock AI extraction</text>
  </g>

  <g transform="translate(370, 310)">
    <rect width="130" height="32" rx="16" fill="#E0F2FE" stroke="#7DD3FC" stroke-width="1" />
    <circle cx="16" cy="16" r="4" fill="#0284C7" />
    <text x="28" y="21" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="600" fill="#0F172A">Human review</text>
  </g>

  <g transform="translate(520, 310)">
    <rect width="180" height="32" rx="16" fill="#F0F9FF" stroke="#BAE6FD" stroke-width="1" />
    <circle cx="16" cy="16" r="4" fill="#0EA5E9" />
    <text x="28" y="21" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="600" fill="#0F172A">Duplicate risk signal</text>
  </g>

  <g transform="translate(720, 310)">
    <rect width="170" height="32" rx="16" fill="#E0F2FE" stroke="#7DD3FC" stroke-width="1" />
    <circle cx="16" cy="16" r="4" fill="#0284C7" />
    <text x="28" y="21" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="600" fill="#0F172A">Simulated CRM sync</text>
  </g>

  <g transform="translate(910, 310)">
    <rect width="110" height="32" rx="16" fill="#F0F9FF" stroke="#BAE6FD" stroke-width="1" />
    <circle cx="16" cy="16" r="4" fill="#0EA5E9" />
    <text x="28" y="21" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="600" fill="#0F172A">Audit trail</text>
  </g>
</svg>
